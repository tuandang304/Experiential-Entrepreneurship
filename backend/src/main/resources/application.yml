server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${CONTEXT_PATH}

spring:
  application:
    name: ${APP_NAME}

  config:
    import: optional:file:backend/.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2000ms}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}

  jackson:
    time-zone: ${APP_TIMEZONE}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  accessTokenExpiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600}
  refreshTokenExpiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}

app:
  oauth2:
    frontend-callback-url: ${FRONTEND_CALLBACK_URL}
  auth:
    cookie:
      refresh-token-name: ${AUTH_COOKIE_NAME:refresh_token}
      # Bật true khi chạy HTTPS (production). Trên http://localhost để false.
      secure: ${AUTH_COOKIE_SECURE:false}
      # Lax cho dev (FE/BE cùng site localhost). Cross-site production dùng None + secure=true.
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
      path: ${AUTH_COOKIE_PATH:/}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs # Đường dẫn trả về JSON spec gốc
  swagger-ui:
    enabled: true
    path: /swagger-ui.html # Đường dẫn truy cập giao diện UI trên trình duyệt
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always

  health:
    defaults:
      enabled: true
