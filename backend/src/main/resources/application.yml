server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${CONTEXT_PATH}
  # Nén response JSON (danh sách content item/analytics khá nặng) — giảm thời gian tải trên mạng chậm.
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript
    min-response-size: 2KB

spring:
  application:
    name: ${APP_NAME:aima-backend}

  config:
    import: optional:file:backend/.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require&prepareThreshold=0
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2000ms}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    # Tắt Open-Session-In-View: mọi service đã build DTO TRONG @Transactional (rule #22),
    # nên giữ connection DB suốt lúc serialize JSON chỉ lãng phí pool (hikari chỉ có 5 kết nối,
    # DB remote) — trả connection ngay khi transaction xong để các request song song không phải chờ.
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # DB remote (sslmode=require): mỗi lazy-load là một round-trip mạng. Batch các lazy load
        # thành query IN (...) theo lô 20 — danh sách N bài không còn bắn N query versions/accounts.
        default_batch_fetch_size: 20
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}

  jackson:
    time-zone: ${APP_TIMEZONE}

  servlet:
    multipart:
      max-file-size: 11MB
      max-request-size: 12MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account%20consent

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  accessTokenExpiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600}
  refreshTokenExpiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}

supabase:
  url: ${SUPABASE_URL}
  anon-key: ${SUPABASE_ANON_KEY:}
  service-key: ${SUPABASE_SERVICE_KEY}

otp:
  # Thời gian sống của OTP đặt lại mật khẩu (giây).
  ttl-seconds: ${OTP_TTL_SECONDS:90}
  # Số lần nhập sai tối đa trước khi OTP bị vô hiệu hoá (chống brute-force).
  max-attempts: ${OTP_MAX_ATTEMPTS:5}
  # Thời gian giữ cờ "đã verify OTP" để cho phép đặt lại mật khẩu (giây).
  verified-ttl-seconds: ${OTP_VERIFIED_TTL_SECONDS:300}

brevo:
  api-key: ${BREVO_API_KEY}
  sender:
    email: ${BREVO_SENDER_EMAIL}
    name: ${BREVO_SENDER_NAME:AIMA}

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  oauth2:
    frontend-callback-url: ${FRONTEND_CALLBACK_URL}
  auth:
    cookie:
      refresh-token-name: ${AUTH_COOKIE_NAME:refresh_token}
      access-token-name: ${AUTH_ACCESS_COOKIE_NAME:access_token}
      # Bật true khi chạy HTTPS (production). Trên http://localhost để false.
      secure: ${AUTH_COOKIE_SECURE:false}
      # Lax cho dev (FE/BE cùng site localhost). Cross-site production dùng None + secure=true.
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
      path: ${AUTH_COOKIE_PATH:/}
      # Domain của cookie, vd .aima-marketing.id.vn khi FE/BE nằm trên hai subdomain cùng
      # domain gốc (first-party, Safari/Brave không chặn). Trống = không set Domain.
      domain: ${COOKIE_DOMAIN:}

# Cấu hình liên kết tài khoản MXH qua Meta (Facebook/Instagram + Threads).
meta:
  facebook:
    app-id: ${META_FACEBOOK_APP_ID:}
    app-secret: ${META_FACEBOOK_APP_SECRET:}
    redirect-uri: ${META_FACEBOOK_REDIRECT_URI:}
    scopes: ${META_FACEBOOK_SCOPES:}

  threads:
    app-id: ${META_THREADS_APP_ID:}
    app-secret: ${META_THREADS_APP_SECRET:}
    redirect-uri: ${META_THREADS_REDIRECT_URI:}
    scopes: ${META_THREADS_SCOPES:}
  graph-base-url: ${META_GRAPH_BASE_URL:https://graph.facebook.com}
  threads-base-url: ${META_THREADS_BASE_URL:https://graph.threads.net}
  # Bật appsecret_proof cho mọi request Meta (bắt buộc ở production).
  app-secret-proof-enabled: ${META_APP_SECRET_PROOF_ENABLED:false}
  # Webhook nhận thông báo vi phạm/gỡ bài sau khi đăng (đăng ký URL /webhooks/meta trên Meta App).
  webhook:
    verify-token: ${META_WEBHOOK_VERIFY_TOKEN:}

# Cấu hình gọi AI service (Python/FastAPI) để tạo nội dung (FR-24..FR-30).
ai-service:
  base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
  timeout-seconds: ${AI_SERVICE_TIMEOUT_SECONDS:60}
  # Shared secret với AI service (header X-Internal-Token) — cùng giá trị AI_INTERNAL_TOKEN
  # trong ai/.env. Cần cho test-connection + request mang llm_config (AI_CONFIG_FROM_DB=true).
  internal-token: ${AI_INTERNAL_TOKEN:}

# Cấu hình AI theo DB (admin quản lý provider/model/routing — trang "Cấu hình AI").
# from-db=false (mặc định) → payload gửi AI service KHÔNG kèm llm_config, AI service
# chạy bằng env của nó như trước (đường rollback). Chỉ bật khi admin đã dán key + verify.
ai-config:
  from-db: ${AI_CONFIG_FROM_DB:false}
  # Seed 1 lần từ env (copy giá trị từ ai/.env, tuỳ chọn). Trống → provider vẫn được tạo
  # nhưng chưa có key, admin dán key qua UI. Chỉ áp khi TẠO MỚI row, không ghi đè DB.
  # Model để trống → dùng default trong AiConfigDataInitializer (khớp ai/src/config.py).
  seed:
    anthropic-api-key: ${AI_SEED_ANTHROPIC_API_KEY:}
    anthropic-model: ${AI_SEED_ANTHROPIC_MODEL:}
    google-api-key: ${AI_SEED_GOOGLE_API_KEY:}
    google-model: ${AI_SEED_GOOGLE_MODEL:}

aima:
  # true trên môi trường THẬT (Render): chặn cứng mọi dev-tool (dev-seed credit…) bất kể cờ
  # dev — biến độc lập, không kéo side effect của Spring profile. Dev để mặc định false.
  production-mode: ${AIMA_PRODUCTION_MODE:false}
  # DEV-ONLY: bật endpoint seed token_credits (POST /admin/usage/users/{id}/dev-credits).
  dev:
    credit-seed-enabled: ${AIMA_DEV_CREDIT_SEED:false}
    # DEV-ONLY: bật endpoint seed payments mẫu (POST/DELETE /admin/revenue/dev-seed) để dựng
    # giao diện Quản lý doanh thu trước khi có cổng payOS. GỠ/TẮT khi có thanh toán thật.
    payment-seed-enabled: ${AIMA_DEV_PAYMENT_SEED:false}
    # DEV-ONLY: bật endpoint seed số liệu Phân tích mẫu (POST/DELETE /analytics/dev-seed) để dựng
    # trang Phân tích (UI-08) trước khi có bài đăng thật đủ 24h. GỠ/TẮT khi có dữ liệu thật.
    analytics-seed-enabled: ${AIMA_DEV_ANALYTICS_SEED:false}
  encryption:
    # 32 byte base64 (openssl rand -base64 32). Bắt buộc — app fail khi startup nếu thiếu.
    key: ${AIMA_ENCRYPTION_KEY}
  oauth:
    state-ttl-minutes: ${OAUTH_STATE_TTL_MINUTES:10}
    frontend-success-redirect: ${FE_OAUTH_SUCCESS_URL:http://localhost:3000/settings?tab=connections}
    frontend-error-redirect: ${FE_OAUTH_ERROR_URL:http://localhost:3000/settings?tab=connections&error=oauth_failed}
  logging:
    # Cửa sổ chống trùng activity log (giây): cùng userId + action + targetId trong khoảng này
    # chỉ ghi 1 lần. 0 = tắt dedup.
    # LƯU Ý: các action trong ActivityAction.DEDUP_EXEMPT (LOGIN_FAILED) KHÔNG bị gộp — tần suất
    # thử đăng nhập sai chính là dữ liệu bảo mật; chúng dùng trần theo IP bên dưới thay thế.
    activity-dedup-seconds: ${ACTIVITY_LOG_DEDUP_SECONDS:60}
    # Trần số dòng/giờ cho MỖI IP với action được miễn dedup. Vượt trần → ghi 1 dòng tổng hợp
    # rồi im lặng tới hết giờ. 0 = tắt trần.
    activity-ip-hourly-cap: ${ACTIVITY_LOG_IP_HOURLY_CAP:100}
  # Số ngày giữ dữ liệu vết trước khi LogRetentionJob (03:30 hằng ngày) xoá cứng.
  # Đặt 0 để tắt việc dọn bảng tương ứng.
  retention:
    activity-log-days: ${ACTIVITY_LOG_RETENTION_DAYS:90}
    system-log-days: ${SYSTEM_LOG_RETENTION_DAYS:180}
    usage-success-days: ${USAGE_SUCCESS_RETENTION_DAYS:90}
    usage-error-days: ${USAGE_ERROR_RETENTION_DAYS:180}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs # Đường dẫn trả về JSON spec gốc
  swagger-ui:
    enabled: true
    path: /swagger-ui.html # Đường dẫn truy cập giao diện UI trên trình duyệt
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always

  health:
    defaults:
      enabled: true
