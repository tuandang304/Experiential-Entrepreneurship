server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${CONTEXT_PATH}

spring:
  application:
    name: ${APP_NAME}

  config:
    import: optional:file:backend/.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require&prepareThreshold=0
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2000ms}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}

  jackson:
    time-zone: ${APP_TIMEZONE}

  servlet:
    multipart:
      max-file-size: 11MB
      max-request-size: 12MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  accessTokenExpiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600}
  refreshTokenExpiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}

supabase:
  # URL dự án Supabase, ví dụ https://xyz.supabase.co
  url: ${SUPABASE_URL}
  # Anon key (public) — không dùng ở backend, giữ để tham chiếu/đầy đủ cấu hình.
  anon-key: ${SUPABASE_ANON_KEY:}
  # service_role key — toàn quyền Storage, CHỈ dùng ở backend, KHÔNG lộ ra frontend.
  service-key: ${SUPABASE_SERVICE_KEY}

otp:
  # Thời gian sống của OTP đặt lại mật khẩu (giây).
  ttl-seconds: ${OTP_TTL_SECONDS:90}
  # Số lần nhập sai tối đa trước khi OTP bị vô hiệu hoá (chống brute-force).
  max-attempts: ${OTP_MAX_ATTEMPTS:5}
  # Thời gian giữ cờ "đã verify OTP" để cho phép đặt lại mật khẩu (giây).
  verified-ttl-seconds: ${OTP_VERIFIED_TTL_SECONDS:300}


app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  oauth2:
    frontend-callback-url: ${FRONTEND_CALLBACK_URL}
  auth:
    cookie:
      refresh-token-name: ${AUTH_COOKIE_NAME:refresh_token}
      # Bật true khi chạy HTTPS (production). Trên http://localhost để false.
      secure: ${AUTH_COOKIE_SECURE:false}
      # Lax cho dev (FE/BE cùng site localhost). Cross-site production dùng None + secure=true.
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
      path: ${AUTH_COOKIE_PATH:/}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs # Đường dẫn trả về JSON spec gốc
  swagger-ui:
    enabled: true
    path: /swagger-ui.html # Đường dẫn truy cập giao diện UI trên trình duyệt
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always

  health:
    defaults:
      enabled: true
